name: 'CodeQL Verification'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    uses: goschtalt/.github/.github/workflows/codeql.yml@62ffcce747f40cfe8af857f00a2bc0397805749b # v1.2.76
    secrets: inherit
