---
name: 'Dependabot auto approvals'

on:
  pull_request_target:
  schedule:
    - cron: '28 22 * * 6'

permissions:
  pull-requests: write
  contents: write

jobs:
  package:
    uses: goschtalt/.github/.github/workflows/approve-dependabot.yml@f6f0618db893e8c037a979d5f769adb9250e2fe2 # v1.2.73
    secrets: inherit
